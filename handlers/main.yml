---

- name: Update initramfs
  become: true
  ansible.builtin.command: >
    update-initramfs -u
  changed_when: true

- name: Update grub
  become: true
  ansible.builtin.command: >
    update-grub
  changed_when: true

- name: Restart auditd
  become: true
  ansible.builtin.systemd_service:
    name: auditd.service
    state: restarted
